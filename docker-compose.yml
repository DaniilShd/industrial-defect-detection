services:
  synthetic:
    build:
      context: .
      dockerfile: generation/Dockerfile
    container_name: synthetic_generator
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HF_HOME=/app/cache/huggingface
      - HUGGINGFACE_HUB_CACHE=/app/cache/huggingface
      - TRANSFORMERS_CACHE=/app/cache/huggingface
      - TORCH_HOME=/app/cache/torch
      - CUDA_VISIBLE_DEVICES=0
      # Оптимизация под RTX 5070 Ti
      - PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:512
      - OMP_NUM_THREADS=8
    volumes:
      - ./data:/app/data              # входные реальные изображения
      - ./results:/app/results        # выходная синтетика
      - ./generation:/app/generation  # скрипты генерации
      - ./cache:/app/cache            # кеш HF и torch
      - ./download_data:/app/download_data
    shm_size: 16g                     # важно для DataLoader
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    ulimits:
      memlock: -1
      stack: 67108864
    working_dir: /app
    stdin_open: true
    tty: true

  # ============================================
  # Анализ оригинальных изображений
  # ============================================
  analysis:
    build:
      context: .
      dockerfile: analysis/Dockerfile
    container_name: analysis
    environment:
      - PYTHONPATH=/app:/app/analysis/original/utils:/app/analysis/original/scripts
    volumes:
      - ./data:/app/data:ro        # read-only исходные данные
      - ./analysis:/app/analysis   # скрипты + конфиг
    working_dir: /app
    stdin_open: true
    tty: true
    command: tail -f /dev/null