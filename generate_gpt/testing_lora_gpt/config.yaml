# ============================================================
# generate/testing_lora/config.yaml
# ============================================================
experiment:
  name: "lora_finetune"
  description: "LoRA + SD Inpainting — Seamless Insertion & Context Swapping"

paths:
  real_train: "/app/data/processed/balanced_defect_patches/train"
  real_val: "/app/data/processed/balanced_defect_patches/val"
  real_test: "/app/data/processed/balanced_defect_patches/test"
  clean_patches: "data/processed/balanced_clean_patches/train"  # ← чистые фоны
  results_dir: "/app/data/results/lora_test_v3"

lora:
  rank: 16
  alpha: 16
  learning_rate: 0.005
  max_steps: 100
  batch_size: 4
  save_every: 500
  prompt_dropout: 0.1
  image_size: 512
  mask_blur_kernel: 9
  use_bf16: true
  gradient_checkpointing: false

generation:
  random_seed: 42
  variants: 2
  
  sd_steps: 35
  sd_guidance_scale: 7.0
  guidance_jitter: 0.3
  
  strength_min: 0.99
  strength_max: 0.99
  
  # Context Swapping
  use_clean_backgrounds: true     # ← вставлять дефекты на чистые фоны
  clean_background_ratio: 1.0     # ← 50% синтетики — на чистых фонах
  jitter_bbox: true               # ← случайное смещение bbox
  apply_affine: false              # ← аффинные искажения маски
  
  pad: 32
  mask_dilate_kernel: 7
  mask_dilate_iterations: 1
  mask_blur_kernel: 7
  
  color_correction: 0.85
  edge_blur_kernel: 5
  edge_blur_strength: 0.7
  use_high_freq_injection: true
  high_freq_alpha: 0.3
  
  negative_prompt: "blurry, low quality, artifacts"
  
  class_labels:
    0: "surface cavity"
    1: "hairline"
    2: "guide scratch"
    3: "rolled-in scale"
  
  prompt_templates:
    - "photo of {cls} on steel sheet, industrial lighting, ultra realistic, 4k"
    - "close-up photo of {cls}, metallic surface, sharp details, realistic texture"
    - "{cls} defect on brushed steel, high frequency detail, macro photography"
    - "industrial defect: {cls}, steel surface, realistic lighting, no blur"

ltdetr:
  model: "dinov3/convnext-tiny-ltdetr-coco"
  max_steps: 5500
  early_stopping_patience: 3
  val_every_steps: 500
  lr: 0.0001
  batch_size: 8
  image_size: 640
  backbone_freeze: true
  backbone_lr_factor: 0.1
  precision: "bf16-mixed"
  seed: 42

dataset:
  nc: 4
  names:
    0: "defect_1"
    1: "defect_2"
    2: "defect_3"
    3: "defect_4"

mlflow:
  tracking_uri: "file:///app/mlruns"
  experiment_name: "lora_finetune"
  run_name: "lora_inpaint_v3"