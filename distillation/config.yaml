experiment:
  name: "distillation_lightweight_models"
  description: "Дистилляция LTDETR+DINOv2 в лёгкие модели"
  author: "магистерская диссертация"

# ============================================================
# УЧИТЕЛЬ — настраивается по результатам предыдущего эксперимента
# ============================================================
teacher:
  # Лучший датасет из experiments/
  dataset: "real_plus_synthetic_aug"

  # Стратегия: frozen / finetune / ssl
  strategy: "ssl"

  # Модель LTDETR (единая для всех экспериментов)
  model: "dinov2/vits14-ltdetr"

  # Путь к уже готовому учителю (заполнится после первого обучения)
  weights_path: ""

  # Параметры обучения LTDETR
  max_steps: 7000
  val_every_steps: 500
  lr: 0.0001
  batch_size: 8

  # Параметры SSL (только при strategy = ssl)
  ssl:
    unlabeled_data: "/app/data/unlabeled"
    epochs: 10
    batch_size: 32

# ============================================================
# ПУТИ
# ============================================================
paths:
  experiment_data: "/app/data/experiment/datasets"
  results_dir: "/app/distillation/reports"
  models_dir: "/app/distillation/models"

# ============================================================
# УЧЕНИКИ
# ============================================================
students:
  yolo_nano:
    model: "yolov8n"
    epochs: 100
    imgsz: 640
    batch: 16
    lr: 0.01

  yolo_nano_fgd:
    model: "yolov8n"
    epochs: 100
    imgsz: 640
    batch: 16
    lr: 0.01
    fgd_layers: ["backbone", "neck", "head"]
    fgd_weight: 0.5

  picodet_s:
    model: "picodet-s-coco"
    steps: 5000
    batch: 16
    lr: 0.0001

  picodet_s_fgd:
    model: "picodet-s-coco"
    steps: 5000
    batch: 16
    lr: 0.0001
    fgd_layers: ["backbone", "neck"]
    fgd_weight: 0.5

  faster_rcnn_r18_fgd:
    backbone: "resnet18"
    epochs: 50
    batch: 8
    lr: 0.001
    fgd_layers: ["backbone", "rpn", "roi_head"]
    fgd_weight: 0.5

# ============================================================
# FPS ЗАМЕР
# ============================================================
fps:
  device: "cpu"
  warmup: 50
  iterations: 500
  img_size: [640, 640]

# ============================================================
# MLflow
# ============================================================
mlflow:
  tracking_uri: "file:///app/mlruns"
  experiment_name: "distillation_lightweight"

# ============================================================
# YOLO КЛАССЫ
# ============================================================
classes:
  num_classes: 4
  names:
    0: "defect1"
    1: "defect2"
    2: "defect3"
    3: "defect4"