# ============================================================
# КОНФИГУРАЦИЯ ГЕНЕРАЦИИ СИНТЕТИЧЕСКИХ ДАННЫХ
# ============================================================

# Пути
paths:
  input_dir: "/app/data/processed/balanced_defect_patches/train/images"
  rle_csv: "/app/data/processed/balanced_defect_patches/train/train_rle.csv"
  output_dir: "/app/data/synthetic_v1"

# Параметры генерации
generation:
  variants: 3
  limit: null
  random_seed: 42

# Stable Diffusion — общие
sd:
  steps: 20
  guidance_scale: 1.8

# Stable Diffusion — дефект
sd_defect:
  strength_min: 0.25
  strength_max: 0.45
  prompt: "metal surface defect, scratch, industrial steel texture, metallic sheen, brushed metal"
  negative_prompt: "smooth, plastic, wood, rust, glass, organic, painted, colorful, rainbow, vibrant"
  defect_consistency: 1.0
  color_correction_strength: 0.85

# Stable Diffusion — фон
sd_background:
  strength_min: 0.15
  strength_max: 0.25
  steps: 20
  guidance_scale: 1.5
  prompt: "industrial steel surface, brushed metal texture, metallic sheen, uniform metal"
  negative_prompt: "defect, scratch, crack, dent, damage, rust, colorful, rainbow, vibrant"
  color_correction_strength: 0.6

# Спектральный контроль
spectral:
  use_spectrum_matching: true
  use_high_freq_injection: true
  high_freq_alpha: 0.35

scaling:
  factors:
    - [1.05, 1.0]
    - [1.0, 1.05]
    - [1.1, 1.0]
    - [1.0, 1.1]
    - [1.15, 1.0]
    - [1.0, 1.15]
    - [1.1, 1.05]
    - [1.05, 1.1]
    - [1.2, 1.0]
    - [1.0, 1.2]
    - [1.15, 1.15]
    - [1.3, 1.0]
    - [1.0, 1.3]
    # Дубли для большего веса масштабированных вариантов
    - [1.05, 1.05]
    - [1.1, 1.1]

# MLflow
mlflow:
  tracking_uri: "file:///app/mlruns"
  experiment_name: "synthetic_data_generation"
  log_sample_images: 10